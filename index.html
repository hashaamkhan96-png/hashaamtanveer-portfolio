<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hashaam Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#050505;
  color:white;
  overflow:hidden;
}

/* CUSTOM CURSOR */
.cursor{
  width:20px;height:20px;
  border:2px solid #00ffee;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9999;
  transition:0.1s;
}

/* NEON BACKGROUND */
body::before{
  content:'';
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 30% 30%,#00ffee,transparent),
             radial-gradient(circle at 70% 70%,#ff00cc,transparent);
  filter:blur(120px);
  opacity:0.25;
  z-index:-2;
}

/* SMOOTH WRAPPER */
#smooth-wrapper{
  overflow:hidden;
}
#smooth-content{
  will-change:transform;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:25px 60px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}
nav h1{
  font-weight:800;
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 10%;
}
.hero h2{
  font-size:70px;
}
.hero span{
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARDS */
.card{
  padding:40px;
  margin:40px 0;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  transition:0.4s;
}
.card:hover{
  transform:translateY(-15px) scale(1.03);
  box-shadow:0 0 60px rgba(0,255,255,0.4);
}

/* MAGNETIC BUTTON */
.btn{
  display:inline-block;
  padding:15px 35px;
  border-radius:50px;
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  color:black;
  margin-top:30px;
  cursor:pointer;
  position:relative;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<div class="cursor"></div>
<canvas id="bg"></canvas>

<div id="smooth-wrapper">
<div id="smooth-content">

<nav>
  <h1>Hashaam</h1>
</nav>

<section class="hero">
  <h2>Hi, I'm <span>Hashaam</span></h2>
  <p>Keep your original content</p>
  <div class="btn magnet">View Work</div>
</section>

<section style="padding:120px 10%;">
  <div class="card">About (keep your content)</div>
  <div class="card">Projects (keep your content)</div>
  <div class="card">Contact (keep your content)</div>
</section>

</div>
</div>

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// LENIS SMOOTH SCROLL
const lenis = new Lenis();
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

// CUSTOM CURSOR
const cursor = document.querySelector(".cursor");
window.addEventListener("mousemove",(e)=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
});

// MAGNETIC BUTTON
document.querySelectorAll(".magnet").forEach(btn=>{
  btn.addEventListener("mousemove",(e)=>{
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2;
    const y = e.clientY - rect.top - rect.height/2;
    btn.style.transform=`translate(${x*0.3}px,${y*0.3}px)`;
  });
  btn.addEventListener("mouseleave",()=>{
    btn.style.transform="translate(0,0)";
  });
});

// GSAP SCROLL
gsap.utils.toArray(".card").forEach(card=>{
  gsap.from(card,{
    scrollTrigger:{trigger:card,start:"top 80%"},
    y:100,
    opacity:0,
    duration:1
  });
});

// THREE JS ADVANCED PARTICLES
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas:bg,alpha:true});
renderer.setSize(innerWidth,innerHeight);

const particlesGeometry = new THREE.BufferGeometry();
const count = 2000;
const positions = new Float32Array(count*3);

for(let i=0;i<count*3;i++){
  positions[i]=(Math.random()-0.5)*10;
}

particlesGeometry.setAttribute('position',new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
  size:0.015,
  color:0xff00cc
});

const mesh = new THREE.Points(particlesGeometry,material);
scene.add(mesh);

camera.position.z=3;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.y += 0.0008;
  mesh.rotation.x += 0.0005;
  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
