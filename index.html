<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Systems — Hashaam</title>

<link rel="stylesheet" href="styles.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- LENIS -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.6/bundled/lenis.min.js"></script>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>

<body>

<canvas id="bg"></canvas>

<div class="transition"></div>
<div class="cursor"></div>
<div class="noise"></div>

<!-- AI CHAT -->
<div class="ai-chat">
  <div class="chat-header">AI Assistant</div>
  <div class="chat-body" id="chatBody"></div>
  <input id="chatInput" placeholder="Ask something..." />
</div>

<header class="navbar">
  <div class="logo">HT.</div>
</header>

<section class="hero">
  <h1 class="reveal">AI <span>Systems</span></h1>
  <p class="reveal">Automation • Intelligence • Scale</p>
  <button class="cta magnetic">Start Project</button>
</section>

<section class="story">
  <h2 class="reveal">We build intelligent systems</h2>
  <p class="reveal">From idea → scalable product → automation</p>
</section>

<section class="grid">
  <div class="card">AI Agents</div>
  <div class="card">Automation Pipelines</div>
  <div class="card">Scalable Systems</div>
</section>

<script src="script.js"></script>
</body>
</html>
