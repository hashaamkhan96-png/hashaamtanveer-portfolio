<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hashaam Tanveer — Automation & CRM Systems Architect</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#050505;
  color:#fff;
  overflow:hidden;
}

/* ================= NEON BG ================= */
body::before{
  content:'';
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 30%, #00ffee, transparent),
    radial-gradient(circle at 80% 70%, #ff00cc, transparent);
  filter:blur(120px);
  opacity:0.25;
  z-index:-2;
}

/* ================= CURSOR ================= */
.cursor{
  width:18px;height:18px;
  border:2px solid #00ffee;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:difference;
}

/* ================= SMOOTH ================= */
#smooth-wrapper{overflow:hidden}
#smooth-content{will-change:transform}

/* ================= NAV ================= */
nav{
  position:fixed;
  width:100%;
  padding:25px 60px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.nav-name{
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 10%;
  position:relative;
}

#hero-canvas{
  position:absolute;
  inset:0;
  z-index:-1;
}

.hero h1{
  font-size:70px;
}

.grad-text{
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= BUTTON ================= */
.btn-primary,.btn-ghost{
  padding:12px 24px;
  border-radius:40px;
  margin-right:10px;
  display:inline-block;
  transition:0.3s;
}

.btn-primary{
  background:linear-gradient(90deg,#00ffee,#ff00cc);
  color:black;
}

.btn-primary:hover{
  box-shadow:0 0 30px #00ffee;
  transform:scale(1.05);
}

/* ================= CARDS ================= */
.wcard{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  transition:0.4s;
  transform-style:preserve-3d;
}

.wcard:hover{
  transform:rotateY(6deg) rotateX(6deg) scale(1.03);
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}

/* ================= SECTION ================= */
.section{
  padding:120px 10%;
}

.reveal{
  opacity:0;
  transform:translateY(80px);
}

</style>
</head>

<body>

<div class="cursor"></div>

<div id="smooth-wrapper">
<div id="smooth-content">

<!-- NAV -->
<nav>
  <div class="nav-name">Hashaam Tanveer</div>
</nav>

<!-- HERO -->
<section class="hero">
  <canvas id="hero-canvas"></canvas>
  <div>
    <h1>Systems <span class="grad-text">Architect</span></h1>
    <p>Keep your original hero content here</p>
    <br>
    <a class="btn-primary">View Work</a>
    <a class="btn-ghost">Resume</a>
  </div>
</section>

<!-- WORK -->
<section class="section">
  <div class="wcard reveal">Project 1</div>
  <div class="wcard reveal">Project 2</div>
  <div class="wcard reveal">Project 3</div>
</section>

<!-- ABOUT -->
<section class="section">
  <div class="reveal">
    <h2>About</h2>
    <p>Your original about content</p>
  </div>
</section>

</div>
</div>

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

/* LENIS */
const lenis = new Lenis();
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* CURSOR */
const cursor = document.querySelector(".cursor");
window.addEventListener("mousemove",(e)=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`
});

/* MAGNETIC */
document.querySelectorAll(".btn-primary,.btn-ghost").forEach(btn=>{
  btn.addEventListener("mousemove",(e)=>{
    const r=btn.getBoundingClientRect();
    const x=e.clientX-r.left-r.width/2;
    const y=e.clientY-r.top-r.height/2;
    btn.style.transform=`translate(${x*0.2}px,${y*0.2}px)`
  });
  btn.addEventListener("mouseleave",()=>btn.style.transform="translate(0,0)");
});

/* GSAP */
gsap.registerPlugin(ScrollTrigger);

gsap.utils.toArray(".reveal").forEach(el=>{
  gsap.to(el,{
    scrollTrigger:{trigger:el,start:"top 85%"},
    opacity:1,
    y:0,
    duration:1
  });
});

/* THREE HERO */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("hero-canvas"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

const geo=new THREE.BufferGeometry();
const count=3000;
const pos=new Float32Array(count*3);

for(let i=0;i<count*3;i++){
  pos[i]=(Math.random()-0.5)*12;
}

geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

const mat=new THREE.PointsMaterial({size:0.01,color:0x00ffee});
const mesh=new THREE.Points(geo,mat);
scene.add(mesh);

camera.position.z=4;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.y+=0.0008;
  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
