<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra Portfolio</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- LENIS -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.6/bundled/lenis.min.js"></script>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#0a0a0a;
  color:#fff;
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.loader h1{
  font-size:40px;
  background:linear-gradient(90deg,#00f0ff,#ff00ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* PROGRESS BAR */
.progress{
  position:fixed;
  top:0;
  left:0;
  height:3px;
  width:0%;
  background:linear-gradient(90deg,#00f0ff,#ff00ff);
  z-index:1000;
}

/* CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CURSOR */
.cursor{
  width:20px;height:20px;
  border:2px solid #fff;
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:difference;
  transition:0.1s;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  z-index:100;
}

.logo{font-weight:700;}

nav a{color:#fff;text-decoration:none;margin-left:30px;}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1 span{
  display:inline-block;
  font-size:70px;
  background:linear-gradient(90deg,#00f0ff,#ff00ff);
  -webkit-background-clip:text;
  color:transparent;
  transform:translateY(100%);
  opacity:0;
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:14px 30px;
  border:1px solid #fff;
  display:inline-block;
  transition:0.3s;
  position:relative;
}

.btn:hover{
  box-shadow:0 0 25px #00f0ff;
}

/* SECTION */
.section{
  padding:120px 80px;
}

.card{
  margin-top:20px;
  padding:30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:15px;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-15px) scale(1.02);
  box-shadow:0 0 30px rgba(0,255,255,0.4);
}

</style>
</head>

<body>

<div class="loader"><h1>Loading...</h1></div>
<div class="progress"></div>
<canvas id="bg"></canvas>
<div class="cursor"></div>

<nav>
  <div class="logo">SYM BINEL</div>
  <div>
    <a href="#">Home</a>
    <a href="#">Work</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1 id="title">
    <span>C</span><span>r</span><span>e</span><span>a</span><span>t</span><span>i</span><span>v</span><span>e</span>
    <br>
    <span>D</span><span>e</span><span>v</span><span>e</span><span>l</span><span>o</span><span>p</span><span>e</span><span>r</span>
  </h1>
</section>

<section class="section">
  <h2>About</h2>
  <div class="card">Your same content</div>
</section>

<section class="section">
  <h2>Projects</h2>
  <div class="card">Project 1</div>
  <div class="card">Project 2</div>
</section>

<section class="section">
  <h2>Contact</h2>
  <div class="card">Email here</div>
</section>

<script>

/* LENIS SMOOTH SCROLL */
const lenis = new Lenis();

function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* LOADER */
gsap.to(".loader",{
  opacity:0,
  delay:1.5,
  onComplete:()=>document.querySelector(".loader").style.display="none"
});

/* TEXT ANIMATION */
gsap.to("#title span",{
  y:0,
  opacity:1,
  stagger:0.05,
  delay:1
});

/* SCROLL ANIMATION */
gsap.utils.toArray(".section").forEach(sec=>{
  gsap.from(sec,{
    scrollTrigger:sec,
    y:100,
    opacity:0,
    duration:1.2
  });
});

/* PROGRESS BAR */
window.addEventListener("scroll",()=>{
  let sc = window.scrollY;
  let dh = document.body.scrollHeight - window.innerHeight;
  document.querySelector(".progress").style.width = (sc/dh)*100 + "%";
});

/* CURSOR */
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.top = e.clientY+"px";
  cursor.style.left = e.clientX+"px";
});

/* MAGNETIC BUTTON */
document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("mousemove",e=>{
    let rect = btn.getBoundingClientRect();
    let x = e.clientX - rect.left - rect.width/2;
    let y = e.clientY - rect.top - rect.height/2;
    btn.style.transform = `translate(${x*0.2}px,${y*0.2}px)`;
  });
  btn.addEventListener("mouseleave",()=>{
    btn.style.transform = `translate(0,0)`;
  });
});

/* THREE JS */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

const geometry = new THREE.IcosahedronGeometry(10,1);
const material = new THREE.MeshStandardMaterial({
  color:0x00ffff,
  wireframe:true
});

const mesh = new THREE.Mesh(geometry,material);
scene.add(mesh);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(20,20,20);
scene.add(light);

camera.position.z = 30;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.005;
  mesh.rotation.y += 0.01;
  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
