<!DOCTYPE html>

<title>Tech Stack | Hashaam Tanveer</title>

<style>

body{
font-family:Inter;

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:40px;
max-width:900px;
margin:auto;
}

.stack{
background:#042a26;
padding:30px;
border-radius:10px;
border:1px solid #064d44;
transition:.3s;
}

.stack:hover{
transform:scale(.5);
border-color:#00ffcc;
}

.stack img{
width:60px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Technology Stack</h1>

<div class="grid">

<div class="stack">

</div>

</div>
